services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./backend
    environment:
      DB_HOST: db
    depends_on:
      - db
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api 