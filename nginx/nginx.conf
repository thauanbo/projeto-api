events { worker_connections 1024; }

http {
    server {
        listen 80;
        
        location /api/ {
            # Verifique se o nome aqui é exatamente o nome do serviço no compose
            proxy_pass http://api:8000/;
        }
        
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}